<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PASSAGES Viewer • Blackshield Institute</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .viewer-shell{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px;
      align-items:start;
    }
    .viewer-card{ padding:18px; }
    .viewer-cover img{
      width:100%;
      height:auto;
      display:block;
      border-radius:18px;
      border:1px solid rgba(245,208,122,.18);
      background:rgba(11,18,32,.35);
    }
    .viewer-title{
      font-size:24px;
      margin-bottom:6px;
    }
    .viewer-meta{
      font-size:13px;
      color:var(--muted);
      margin-bottom:14px;
    }
    .viewer-synopsis{
      padding:16px;
      border:1px solid rgba(245,208,122,.18);
      border-radius:18px;
      background:rgba(11,18,32,.35);
      color:var(--text);
      line-height:1.6;
      font-size:14px;
    }
    .viewer-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .viewer-note{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
    }
    .missing-cover{
      min-height:420px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
      border:1px solid rgba(245,208,122,.18);
      border-radius:18px;
      background:rgba(11,18,32,.35);
      color:var(--muted);
      font-size:14px;
    }
    @media (max-width: 900px){
      .viewer-shell{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="logoWrap">
          <img src="assets/images/shield.png" alt="Blackshield Institute Shield" onerror="this.style.display='none';" />
        </div>
        <div class="brandText">
          <b>Blackshield Institute</b>
          <span>PASSAGES Viewer</span>
        </div>
      </div>

      <nav>
        <a class="navBtn" href="index.html">Home</a>
        <a class="navBtn" href="catalog.html">Catalog</a>
        <a class="navBtn gold" href="passage-series.html">PASSAGES</a>
        <a class="navBtn" href="curriculum.html">Curriculum</a>
        <a class="navBtn" href="about.html">About</a>
        <a class="navBtn" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="card viewer-card">
        <div class="viewer-shell">
          <div class="viewer-cover" id="coverWrap">
            <img id="coverImage" src="" alt="PASSAGES cover" />
          </div>

          <div>
            <h1 class="viewer-title" id="bookTitle">PASSAGES</h1>
            <div class="viewer-meta" id="bookMeta">Blackshield Institute • PASSAGES Series</div>

            <div class="viewer-synopsis" id="bookSynopsis">
              Synopsis loading...
            </div>

            <div class="viewer-actions">
              <a class="btn" href="passage-series.html">Back to Series</a>
              <a class="btn primary" id="pdfBtn" href="#" target="_blank" rel="noopener">Open PDF</a>
              <a class="btn" id="coverBtn" href="#" target="_blank" rel="noopener">Open Cover</a>
            </div>

            <div class="viewer-note">
              If the PDF button opens a 404, that means the PDF has not been uploaded yet.
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>© <span id="yr"></span> Blackshield Institute</footer>

  <script>
    const PASSAGES = {
      "01": {
        title: "My Parents Phone Number",
        synopsis: "A foundational PASSAGES title designed to help children remember and safely use important phone numbers. This book builds practical recall, confidence, and readiness for real-world situations."
      },
      "02": {
        title: "My Parents Names",
        synopsis: "This title helps children clearly learn and remember the names of their parents or guardians. It reinforces identity, communication, and practical information every child should know."
      },
      "03": {
        title: "My Parents Address",
        synopsis: "A practical early-learning title that teaches children how to remember their address and understand why location knowledge matters. It supports safety, memory, and real-world readiness."
      },
      "04": {
        title: "Who Can I Trust",
        synopsis: "This book introduces the concept of trust, safe adults, and wise judgment in a child-friendly way. It helps young readers think carefully about who to go to when they need help."
      },
      "05": {
        title: "Im Lost Find a Cop",
        synopsis: "A straightforward guide for children on what to do if they become lost. It teaches calm action, safe choices, and the importance of finding the right authority figure for help."
      },
      "06": {
        title: "I'm a Big Boy Now",
        synopsis: "A growth-centered PASSAGES title that supports maturity, self-control, responsibility, and confidence. It helps young boys understand what growth should look like in practical daily life."
      },
      "07": {
        title: "I'm a Big Girl Now",
        synopsis: "A development-focused title for girls that highlights growth, responsibility, self-respect, and confidence. It reinforces maturity and healthy self-awareness in a supportive format."
      },
      "08": {
        title: "The Power in the Know",
        synopsis: "This title teaches that knowledge is power. It encourages awareness, understanding, and the confidence that comes from being informed and prepared."
      },
      "09": {
        title: "What It Means to Grow Up",
        synopsis: "A practical introduction to maturity, life changes, and responsible development. This book helps readers think clearly about what growth should mean in real life."
      },
      "10": {
        title: "Teen Years and the Brain",
        synopsis: "This title explores development, thinking, behavior, and the challenges of the teen years with a direct and understandable approach. It supports self-awareness and better choices."
      },
      "11": {
        title: "My Boundaries My Limits",
        synopsis: "A clear guide to personal boundaries, self-protection, and respectful limits. It teaches readers the importance of knowing where they end and what they should protect."
      },
      "12": {
        title: "Relationship and Consent",
        synopsis: "A structured title focused on respect, accountability, boundaries, and consent. It introduces relationship ethics in a serious, readable, and developmentally aware way."
      }
    };

    function getBookNumber() {
      const params = new URLSearchParams(window.location.search);
      let b = params.get("b") || "01";
      if (b.length === 1) b = "0" + b;
      if (!PASSAGES[b]) b = "01";
      return b;
    }

    function initViewer() {
      const bookNum = getBookNumber();
      const book = PASSAGES[bookNum];

      document.getElementById("yr").textContent = new Date().getFullYear();
      document.getElementById("bookTitle").textContent = `PASSAGES ${bookNum} — ${book.title}`;
      document.getElementById("bookMeta").textContent = `Blackshield Institute • PASSAGES Series • Book ${bookNum}`;
      document.getElementById("bookSynopsis").textContent = book.synopsis;

      const coverPath = `passages-${bookNum}.png`;
      const pdfPath = `downloads/passages/passages-${bookNum}.pdf`;

      const coverImage = document.getElementById("coverImage");
      const coverWrap = document.getElementById("coverWrap");

      coverImage.src = coverPath;
      coverImage.alt = `${book.title} cover`;

      coverImage.onerror = function () {
        coverWrap.innerHTML = `
          <div class="missing-cover">
            Cover missing for Book ${bookNum}.<br>
            Expected file: assets/images/passages/passages-${bookNum}.png
          </div>
        `;
      };

      document.getElementById("pdfBtn").href = pdfPath;
      document.getElementById("coverBtn").href = coverPath;
    }

    initViewer();
  </script>
</body>
</html>
