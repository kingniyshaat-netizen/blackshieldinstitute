<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Breaking the Generational Curse and Its Effects | Blackshield Institute</title>
  <meta name="description" content="Breaking the Generational Curse and Its Effects — a serious Blackshield Institute publication on inherited trauma, family dysfunction, accountability, and healing.">
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <style>
    .product-page-shell{
      width:min(1180px, calc(100vw - 24px));
      margin:0 auto;
      padding:32px 0 56px;
    }

    .product-hero{
      display:grid;
      grid-template-columns:minmax(280px, 380px) minmax(0, 1fr);
      gap:28px;
      align-items:start;
    }

    .product-panel{
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.06);
      border-radius:20px;
      padding:24px;
    }

    .book-cover-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .book-cover-wrap img{
      width:100%;
      max-width:320px;
      height:auto;
      border-radius:18px;
      display:block;
      box-shadow:0 16px 30px rgba(0,0,0,.28);
    }

    .product-kicker{
      display:inline-block;
      margin:0 0 10px;
      font-size:.78rem;
      letter-spacing:.16em;
      text-transform:uppercase;
      font-weight:800;
      color:var(--gold);
    }

    .product-page-shell h1{
      margin:0 0 14px;
      line-height:1.08;
    }

    .sales-lead{
      font-size:1.08rem;
      color:var(--text);
      margin:0 0 18px;
      line-height:1.65;
    }

    .sales-copy{
      color:var(--muted);
      line-height:1.7;
      margin-bottom:18px;
    }

    .feature-points{
      margin:0 0 22px;
      padding-left:18px;
      color:var(--muted);
      line-height:1.7;
    }

    .price-tag{
      display:inline-block;
      margin:0 0 18px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(212,175,55,.12);
      border:1px solid rgba(212,175,55,.28);
      color:var(--gold);
      font-weight:800;
      letter-spacing:.04em;
    }

    .cta-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:12px;
    }

    .review-note{
      margin-top:18px;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.6;
    }

    @media (max-width: 900px){
      .product-hero{
        grid-template-columns:1fr;
      }

      .book-cover-wrap img{
        max-width:280px;
      }
    }

    @media (max-width: 640px){
      .product-panel{
        padding:18px;
      }

      .cta-row{
        flex-direction:column;
      }

      .cta-row .btn{
        width:100%;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="../../index.html">
