<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Blackshield Institute</title>
  <meta name="description" content="Contact Blackshield Institute." />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="contact">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="assets/images/shield.png" alt="Blackshield Institute Shield" class="brand-logo" />
        <div class="brand-copy">
          <strong>Blackshield Institute</strong>
          <span>Contact</span>
        </div>
      </a>

      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>

      <nav id="site-nav" class="site-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="catalog.html">Catalog</a>
        <a href="passages-series.html">PASSAGES</a>
        <a href="early-access.html">Early Access</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container narrow">
      <div class="section-head">
        <div>
          <p class="eyebrow">CONTACT</p>
          <h1 class="page-title">Contact Blackshield Institute</h1>
          <p class="lede">Use the form below or contact directly.</p>
        </div>
      </div>

      <div class="card form-card">
        <p><strong>Email:</strong> blackshieldinstitute@gmail.com</p>
        <p><strong>Phone:</strong> (555) 555-5555</p>

        <form action="https://formsubmit.co/blackshieldinstitute@gmail.com" method="POST" class="form-grid">
          <label>
            <span>Name</span>
            <input type="text" name="name" required />
          </label>

          <label>
            <span>Email</span>
            <input type="email" name="email" required />
          </label>

          <label class="full">
            <span>Inquiry Type</span>
            <select name="type">
              <option>General Inquiry</option>
              <option>Membership Support</option>
              <option>Digital Product Inquiry</option>
              <option>PASSAGES Inquiry</option>
              <option>Playroom Inquiry</option>
            </select>
          </label>

          <label class="full">
            <span>Message</span>
            <textarea name="message" rows="8" required></textarea>
          </label>

          <input type="hidden" name="_subject" value="Blackshield Institute Inquiry" />
          <input type="hidden" name="_captcha" value="false" />

          <div class="form-actions full">
            <button class="btn btn-primary" type="submit">Send Inquiry</button>
            <a class="btn btn-secondary" href="catalog.html">Back to Catalog</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <strong>Blackshield Institute</strong>
        <p>Institutional digital platform.</p>
      </div>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
