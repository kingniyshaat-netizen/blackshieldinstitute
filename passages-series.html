<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PASSAGES Viewer | Blackshield Institute</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="assets/css/styles.css">

<style>

.viewer{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
margin-top:40px;
}

.cover img{
width:100%;
border-radius:10px;
}

.info{
background:#0c0c0c;
border:1px solid #333;
border-radius:10px;
padding:30px;
}

.info h2{
color:#d4af37;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#d4af37;
color:#000;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<header class="siteHeader">

<div class="brand">

<img src="assets/images/shield.png" class="logo">

<div class="brandText">
<b>Blackshield Institute</b>
<span>PASSAGES Viewer</span>
</div>

</div>

<nav>

<a class="navBtn" href="index.html">Home</a>
<a class="navBtn" href="catalog.html">Catalog</a>
<a class="navBtn gold" href="passage-series.html">PASSAGES</a>
<a class="navBtn" href="curriculum.html">Curriculum</a>
<a class="navBtn" href="about.html">About</a>
<a class="navBtn" href="contact.html">Contact</a>

</nav>

</header>

<main>

<div class="viewer">

<div class="cover">

<img id="bookCover">

</div>

<div class="info">

<h2 id="title"></h2>

<p>
A foundational PASSAGES title designed to build practical memory,
confidence, and early readiness skills.
</p>

<a id="pdfBtn" class="btn">Open PDF</a>

</div>

</div>

</main>

<script>

const params = new URLSearchParams(window.location.search);
const book = params.get("b") || "01";

document.getElementById("bookCover").src =
`assets/images/passages/passages-${book}.png`;

document.getElementById("title").innerText =
`PASSAGES ${book}`;

document.getElementById("pdfBtn").href =
`downloads/passages-${book}.pdf`;

</script>

</body>
</html>
