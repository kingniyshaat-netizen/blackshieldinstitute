  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackshield Institute</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #111827;
}

.logo {
  width: 80px;
  margin-bottom: 10px;
}

h1 {
  margin: 10px 0 5px;
}

h2 {
  text-align: center;
  margin-top: 40px;
}

.section {
  padding: 40px 20px;
  max-width: 1200px;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.grid img {
  width: 100%;
  height: auto;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  transition: transform 0.3s ease;
}

.grid img:hover {
  transform: scale(1.03);
}
</style>
</head>

<body>

<header>
  <img class="logo" src="assets/images/shield.png" alt="Blackshield Institute Shield">
  <h1>Blackshield Institute</h1>
  <p>PASSAGES Series Collection</p>
</header>

<section class="section">
  <h2>PASSAGES Series (Books 01–12)</h2>

  <div class="grid">
    <img src="assets/images/passages/passages-01.png" alt="Passages Book 01">
    <img src="assets/images/passages/passages-02.png" alt="Passages Book 02">
    <img src="assets/images/passages/passages-03.png" alt="Passages Book 03">
    <img src="assets/images/passages/passages-04.png" alt="Passages Book 04">
    <img src="assets/images/passages/passages-05.png" alt="Passages Book 05">
    <img src="assets/images/passages/passages-06.png" alt="Passages Book 06">
    <img src="assets/images/passages/passages-07.png" alt="Passages Book 07">
    <img src="assets/images/passages/passages-08.png" alt="Passages Book 08">
    <img src="assets/images/passages/passages-09.png" alt="Passages Book 09">
    <img src="assets/images/passages/passages-10.png" alt="Passages Book 10">
    <img src="assets/images/passages/passages-11.png" alt="Passages Book 11">
    <img src="assets/images/passages/passages-12.png" alt="Passages Book 12">
  </div>
</section>

</body>
</html>
